<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operations HQ</title>
<meta name="description" content="A calm command centre for projects, sprints and recurring work." />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1c1a17" />
<style>
:root{
  --bg:#14130f; --surface:#1d1b16; --surface-2:#26241d; --line:#34312a;
  --ink:#efe9dc; --ink-soft:#b3ab98; --ink-faint:#7c7563;
  --accent:#d8853f; --accent-soft:#3a2a18;
  --ok:#7ba05b; --ok-soft:#26301c; --warn:#d8a13f; --warn-soft:#332815;
  --danger:#cf6b54; --danger-soft:#371f18; --info:#6f9bb8; --info-soft:#1d2a33;
  --r:10px; --r-lg:14px;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;}
body{padding:0 0 90px;}
a{color:var(--accent);}
button{font-family:inherit;cursor:pointer;}
.wrap{max-width:760px;margin:0 auto;padding:0 16px;}

header.app{padding:26px 16px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);}
header.app .wrap{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
.brand{font-family:var(--serif);font-size:26px;letter-spacing:.3px;}
.brand small{display:block;font-family:var(--sans);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-top:2px;}
.synced{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;}
.dot.off{background:var(--ink-soft);}

nav.tabs{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line);}
nav.tabs .wrap{display:flex;gap:4px;overflow-x:auto;padding:8px 16px;}
.tab{flex:0 0 auto;border:1px solid transparent;background:transparent;color:var(--ink-soft);
  padding:8px 14px;border-radius:99px;font-size:14px;white-space:nowrap;transition:.15s;}
.tab[aria-selected="true"]{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}

main{padding-top:18px;}
section[role="tabpanel"]{display:none;animation:fade .25s ease;}
section[role="tabpanel"].active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

.daystamp{font-family:var(--serif);font-size:15px;color:var(--ink-soft);margin:0 0 12px;}
.block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px 16px;margin:0 0 12px;}
.block > h2{margin:0 0 10px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:8px;}
.block.crit > h2{color:var(--danger);}
.block.quick > h2{color:var(--ok);}
.block.follow > h2{color:var(--info);}
.block.mon > h2{color:var(--warn);}

.row{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:0;}
.box{flex:0 0 auto;width:21px;height:21px;border-radius:6px;border:1.6px solid var(--ink-soft);
  display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;margin-top:1px;transition:.12s;}
.box.on{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);}
.txt{flex:1;font-size:15px;}
.txt.on{text-decoration:line-through;color:var(--ink-soft);}
.owner{font-size:10.5px;padding:1px 7px;border-radius:99px;margin-left:7px;vertical-align:1px;letter-spacing:.04em;}
.owner.you{background:var(--info-soft);color:var(--info);}
.owner.assoc{background:var(--surface-2);color:var(--ink-soft);}
.rm{flex:0 0 auto;border:0;background:transparent;color:var(--ink-soft);font-size:17px;line-height:1;padding:2px 4px;opacity:.5;}
.rm:hover{opacity:1;color:var(--danger);}
.add{display:flex;gap:7px;margin-top:11px;}
.add input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:var(--r);padding:9px 11px;font-size:14px;}
.add input:focus{outline:0;border-color:var(--accent);}
.add button,.btn{background:var(--surface-2);border:1px solid var(--line);color:var(--ink);border-radius:var(--r);padding:9px 13px;font-size:14px;transition:.12s;}
.add button:hover,.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#1a1206;font-weight:600;}
.btn.primary:hover{filter:brightness(1.07);color:#1a1206;}
.empty{color:var(--ink-soft);font-style:italic;font-size:14px;padding:4px 0;}

.cols{display:grid;gap:12px;}
@media(min-width:680px){.cols{grid-template-columns:1fr 1fr 1fr;align-items:start;}}
.count{color:var(--ink-soft);font-weight:400;}

.proj{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px 16px;margin:0 0 12px;}
.proj .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.proj .name{font-family:var(--serif);font-size:19px;}
.tag{font-size:11px;padding:3px 9px;border-radius:99px;letter-spacing:.05em;}
.tag.High{background:var(--danger-soft);color:var(--danger);}
.tag.Medium{background:var(--warn-soft);color:var(--warn);}
.tag.Low{background:var(--surface-2);color:var(--ink-soft);}
.kv{display:flex;gap:8px;font-size:13.5px;margin:5px 0;}
.kv b{flex:0 0 96px;color:var(--ink-soft);font-weight:400;}
.flag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;padding:4px 10px;border-radius:99px;background:var(--danger-soft);color:var(--danger);}

.field{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:var(--r);padding:9px 11px;font-size:14px;margin-bottom:7px;}
.field:focus{outline:0;border-color:var(--accent);}

.rec{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:12px 15px;margin:0 0 10px;}
.rec .freq{font-size:11.5px;padding:2px 9px;border-radius:99px;background:var(--surface-2);color:var(--ink-soft);}
.rec .due{font-size:11.5px;padding:2px 9px;border-radius:99px;background:var(--danger-soft);color:var(--danger);margin-left:6px;}

.note{font-size:13px;color:var(--ink-soft);background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);padding:12px 14px;margin:0 0 14px;}
.note b{color:var(--ink);}

.cal-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;}
.cal-card h3{margin:0 0 6px;font-family:var(--serif);font-size:18px;}
.cal-status{font-size:13px;color:var(--ink-soft);margin-bottom:12px;}
.cal-list{font-size:14px;}
.cal-list li{margin:4px 0;}
.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);background:var(--surface-2);
  border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:99px;font-size:13.5px;
  opacity:0;pointer-events:none;transition:.2s;z-index:60;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

footer.tip{padding:10px 16px 30px;color:var(--ink-soft);font-size:12.5px;text-align:center;}
</style>
</head>
<body>
<header class="app">
  <div class="wrap">
    <div class="brand">Operations HQ<small>chief of staff</small></div>
    <div class="synced"><span id="dot" class="dot off"></span><span id="syncTxt">Local</span></div>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="Views">
  <div class="wrap">
    <button class="tab" role="tab" aria-selected="true" data-tab="daily">Today</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="sprint">Sprints</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="projects">Projects</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="recurring">Recurring</button>
    <button class="tab" role="tab" aria-selected="false" data-tab="calendar">Calendar</button>
  </div>
</nav>

<main class="wrap">
  <section id="daily" role="tabpanel" class="active"></section>
  <section id="sprint" role="tabpanel"></section>
  <section id="projects" role="tabpanel"></section>
  <section id="recurring" role="tabpanel"></section>
  <section id="calendar" role="tabpanel"></section>
</main>

<div id="toast" class="toast"></div>
<footer class="tip">Your data lives in this browser. Use <b>Export</b> on the Projects tab to keep a backup.</footer>

  };
</script>

<script src="app.js"></script>
</body>
</html>
